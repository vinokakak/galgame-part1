<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交错的光与暗 - Demo v4</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            overflow: hidden;
            user-select: none;
        }
        
        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            cursor: pointer;
        }
        
        /* 场景背景层 - 完整场景图直接作为背景 */
        #background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        
        /* CG层 - 用于显示完整CG插画 */
        #cg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        #cg-layer img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
        }
        
        /* 叙述文字 */
        #narration {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            text-align: center;
            color: #fff;
            font-size: 17px;
            line-height: 1.9;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
            z-index: 4;
            display: none;
            padding: 15px 25px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
        }
        
        /* 对话框 - 半透明深色背景 */
        #dialog-box {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 95px;
            background: rgba(10, 10, 20, 0.82);
            backdrop-filter: blur(4px);
            z-index: 5;
            padding: 12px 25px;
            display: none;
            border-top: 1px solid rgba(100, 80, 120, 0.3);
        }
        
        #speaker-name {
            color: #e8d5b7;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 6px;
            text-shadow: 0 0 10px rgba(232, 213, 183, 0.3);
        }
        
        #dialog-text {
            color: #f0f0f0;
            font-size: 16px;
            line-height: 1.6;
        }
        
        /* 标题画面 */
        #title-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20;
        }
        
        #title-screen-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        
        /* 标题Logo区域 */
        .title-logo {
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 1;
            padding: 24px 50px;
            background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.15) 80%, transparent 100%);
            border-radius: 8px;
            min-width: 320px;
        }
        
        .title-logo h1 {
            color: #e8d5b7;
            font-size: 48px;
            text-shadow: 0 0 30px rgba(232, 213, 183, 0.4), 2px 2px 8px rgba(0,0,0,0.8);
            margin-bottom: 10px;
            letter-spacing: 4px;
        }
        
        .title-logo h2 {
            color: #9a8a7a;
            font-size: 16px;
            font-weight: normal;
            margin-bottom: 6px;
        }
        
        .title-logo .subtitle {
            color: #6a5a4a;
            font-size: 13px;
        }
        
        /* 标题菜单按钮 */
        .title-menu {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 2;
            background: linear-gradient(0deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.15) 80%, transparent 100%);
            padding: 24px 50px 30px;
            border-radius: 8px;
        }
        
        .title-btn {
            background: rgba(15, 10, 25, 0.75);
            border: 1px solid rgba(140, 120, 160, 0.35);
            color: #d8c8b0;
            font-size: 16px;
            padding: 12px 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 3px;
            min-width: 220px;
            backdrop-filter: blur(4px);
            font-family: inherit;
        }
        
        .title-btn:hover {
            background: rgba(40, 30, 60, 0.9);
            border-color: rgba(200, 180, 220, 0.6);
            color: #f0e8d8;
            transform: translateX(8px);
            text-shadow: 0 0 10px rgba(200, 180, 220, 0.4);
        }
        
        .title-btn:active {
            transform: translateX(4px);
            background: rgba(60, 45, 80, 0.95);
        }
        
        /* CG画廊 */
        #cg-gallery {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 3, 10, 0.97);
            display: none;
            flex-direction: column;
            z-index: 50;
            padding: 30px;
            box-sizing: border-box;
        }
        
        .cg-gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .cg-gallery-header h2 {
            color: #e8d5b7;
            font-size: 22px;
            letter-spacing: 2px;
        }
        
        .cg-close-btn {
            background: rgba(30, 20, 40, 0.8);
            border: 1px solid rgba(140, 120, 160, 0.4);
            color: #c8b8a0;
            padding: 8px 24px;
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 1px;
            transition: all 0.25s ease;
            font-family: inherit;
        }
        
        .cg-close-btn:hover {
            background: rgba(50, 40, 70, 0.9);
            color: #f0e8d8;
        }
        
        .cg-gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
            overflow-y: auto;
            flex: 1;
            padding: 10px;
        }
        
        .cg-thumb {
            position: relative;
            aspect-ratio: 16/9;
            overflow: hidden;
            border-radius: 4px;
            border: 1px solid rgba(100, 80, 120, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .cg-thumb:hover {
            border-color: rgba(180, 160, 200, 0.6);
            transform: scale(1.03);
        }
        
        .cg-thumb img {
            width: 100%; height: 100%;
            object-fit: cover;
        }
        
        .cg-thumb.locked {
            filter: brightness(0.15);
            cursor: not-allowed;
        }
        
        .cg-thumb.locked::after {
            content: '🔒';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
        }
        
        /* CG大图预览 */
        .cg-viewer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 55;
            cursor: pointer;
        }
        
        .cg-viewer img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
        }
        
        /* 存档界面 */
        #save-load-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 3, 10, 0.97);
            display: none;
            flex-direction: column;
            z-index: 50;
            padding: 30px;
            box-sizing: border-box;
        }
        
        .save-load-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .save-load-header h2 {
            color: #e8d5b7;
            font-size: 22px;
            letter-spacing: 2px;
        }
        
        .save-slots {
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            flex: 1;
            padding: 10px;
        }
        
        .save-slot {
            background: rgba(20, 15, 30, 0.8);
            border: 1px solid rgba(100, 80, 120, 0.3);
            padding: 16px 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .save-slot:hover {
            border-color: rgba(160, 140, 180, 0.5);
            background: rgba(35, 25, 50, 0.9);
        }
        
        .save-slot .slot-info {
            color: #c8b8a0;
        }
        
        .save-slot .slot-info .slot-label {
            font-size: 15px;
            margin-bottom: 4px;
        }
        
        .save-slot .slot-info .slot-detail {
            font-size: 12px;
            color: #7a6a5a;
        }
        
        .save-slot .slot-empty {
            color: #5a5a6a;
            font-size: 14px;
        }
        
        /* 章节标题 */
        #chapter-title {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 15;
        }
        
        #chapter-title h1 {
            color: #e8d5b7;
            font-size: 38px;
            text-align: center;
            white-space: pre-line;
            text-shadow: 0 0 20px rgba(232, 213, 183, 0.3);
            opacity: 0;
            animation: fadeInOut 3.5s ease-in-out forwards;
            letter-spacing: 3px;
        }
        
        @keyframes fadeInOut {
            0% { opacity: 0; transform: scale(0.95); }
            15% { opacity: 1; transform: scale(1); }
            75% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.02); }
        }
        
        /* 选择支 */
        #choice-container {
            position: absolute;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 6;
            display: none;
            flex-direction: column;
            gap: 12px;
            width: 90%;
            max-width: 450px;
        }
        
        .choice-btn {
            background: rgba(25, 20, 35, 0.92);
            border: 1px solid rgba(120, 100, 140, 0.4);
            color: #d8c8b0;
            padding: 16px 30px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            border-radius: 4px;
            backdrop-filter: blur(4px);
        }
        
        .choice-btn:hover {
            background: rgba(50, 40, 70, 0.95);
            border-color: rgba(160, 140, 180, 0.6);
            color: #f0e8d8;
            transform: translateX(5px);
        }
        
        /* 结束画面 */
        #end-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 10, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 25;
        }
        
        #end-screen h1 {
            color: #e8d5b7;
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(232, 213, 183, 0.3);
        }
        
        #end-screen p {
            color: #6a6a7a;
            font-size: 16px;
        }
        
        /* 继续提示 */
        #continue-hint {
            position: absolute;
            bottom: 15px;
            right: 25px;
            color: rgba(150, 140, 160, 0.7);
            font-size: 12px;
            z-index: 6;
            display: none;
            animation: bounce 1.2s infinite ease-in-out;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); opacity: 0.5; }
            50% { transform: translateY(-4px); opacity: 0.9; }
        }
        
        /* 开场独白层 */
        #prologue {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 30;
            cursor: pointer;
        }
        
        #prologue-text {
            color: #8a8a9a;
            font-size: 18px;
            text-align: center;
            max-width: 70%;
            letter-spacing: 2px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        #prologue-text .line {
            display: none;
            opacity: 0;
            transition: opacity 1.2s ease;
        }
        
        #prologue-text .line.active {
            display: block;
            opacity: 1;
        }
        
        #prologue-text .line.fade-out {
            display: block;
            opacity: 0;
            transition: opacity 1s ease;
        }
        
        /* 标题内容区域 - 已由title-logo替代 */
    </style>
</head>
<body>
    <div id="game-container">
        <!-- 场景背景层 - 完整场景图 -->
        <img id="background" src="" alt="">
        
        <!-- CG层 -->
        <div id="cg-layer">
            <img id="cg-image" src="" alt="">
        </div>
        
        <!-- 叙述文字 -->
        <div id="narration"></div>
        
        <!-- 对话框 -->
        <div id="dialog-box">
            <div id="speaker-name"></div>
            <div id="dialog-text"></div>
        </div>
        
        <!-- 继续提示 -->
        <div id="continue-hint">▼ 点击继续</div>
        
        <!-- 选择支 -->
        <div id="choice-container"></div>
        
        <!-- 章节标题 -->
        <div id="chapter-title">
            <h1></h1>
        </div>
        
        <!-- 开场独白 -->
        <div id="prologue">
            <div id="prologue-text"></div>
        </div>
        
        <!-- 标题画面 -->
        <div id="title-screen">
            <img id="title-screen-bg" src="" alt="">
            <div class="title-logo">
                <h1>交错的光与暗</h1>
                <h2>Demo v4 - 温暖的深渊</h2>
                <p class="subtitle">第一章 尤里斯与艾丽斯</p>
            </div>
            <div class="title-menu">
                <button class="title-btn" id="btn-new-game">新游戏</button>
                <button class="title-btn" id="btn-load">读取存档</button>
                <button class="title-btn" id="btn-cg">CG集</button>
                <button class="title-btn" id="btn-fullscreen">全屏</button>
            </div>
        </div>
        
        <!-- CG画廊 -->
        <div id="cg-gallery">
            <div class="cg-gallery-header">
                <h2>CG集</h2>
                <button class="cg-close-btn" id="cg-gallery-close">返回</button>
            </div>
            <div class="cg-gallery-grid" id="cg-gallery-grid"></div>
        </div>
        
        <!-- 存档界面 -->
        <div id="save-load-screen">
            <div class="save-load-header">
                <h2 id="save-load-title">读取存档</h2>
                <button class="cg-close-btn" id="save-load-close">返回</button>
            </div>
            <div class="save-slots" id="save-slots"></div>
        </div>
        
        <!-- 结束画面 -->
        <div id="end-screen">
            <h1>Demo End</h1>
            <p>感谢游玩</p>
        </div>
        
        <!-- CG大图预览 -->
        <div class="cg-viewer" id="cg-viewer">
            <img id="cg-viewer-img" src="" alt="">
        </div>
    </div>
    
    <!-- BGM占位 -->
    <audio id="bgm" loop>
        <source src="" type="audio/mpeg">
    </audio>
    
    <!-- 开场独白BGM -->
    <audio id="prologue-bgm" preload="auto">
        <source src="audio/prologue_bgm.mp3" type="audio/mpeg">
    </audio>
    
    <script>
const IMAGES = {
    'bg_morning_tears': 'https://cdn.jsdelivr.net/gh/vinokakak/galgame-part1@main/img/bg_morning_tears.jpg',
    'bg_lean_morning': 'https://cdn.jsdelivr.net/gh/vinokakak/galgame-part1@main/img/bg_lean_morning.jpg',
    'bg_village_gate': 'https://cdn.jsdelivr.net/gh/vinokakak/galgame-part1@main/img/bg_village_gate.jpg',
    'bg_forest_east': 'https://cdn.jsdelivr.net/gh/vinokakak/galgame-part1@main/img/bg_forest_east.jpg',
    'bg_cliff_edge': 'https://cdn.jsdelivr.net/gh/vinokakak/galgame-part1@main/img/bg_cliff_edge.jpg',
    'bg_abyss_approach': 'https://cdn.jsdelivr.net/gh/vinokakak/galgame-part1@main/img/bg_abyss_approach.jpg',
    'bg_alice_chained': 'https://cdn.jsdelivr.net/gh/vinokakak/galgame-part1@main/img/bg_alice_chained.jpg',
    'bg_alice_eyes': 'https://cdn.jsdelivr.net/gh/vinokakak/galgame-part1@main/img/bg_alice_eyes.jpg',
    'bg_alice_bread': 'https://cdn.jsdelivr.net/gh/vinokakak/galgame-part1@main/img/bg_alice_bread.jpg',
    'cg_pace_woodcut': 'https://cdn.jsdelivr.net/gh/vinokakak/galgame-part1@main/img/cg_pace_woodcut.jpg',
    'cg_anna_sleeping': 'https://cdn.jsdelivr.net/gh/vinokakak/galgame-part1@main/img/cg_anna_sleeping.jpg',
    'bg_black_cat': 'https://cdn.jsdelivr.net/gh/vinokakak/galgame-part1@main/img/bg_black_cat.jpg',
    'bg_mos_puppet': 'https://cdn.jsdelivr.net/gh/vinokakak/galgame-part1@main/img/bg_mos_puppet.jpg',
    'bg_strange_puppet': 'https://cdn.jsdelivr.net/gh/vinokakak/galgame-part1@main/img/bg_strange_puppet.jpg',
    'bg_cursed_mountain': 'https://cdn.jsdelivr.net/gh/vinokakak/galgame-part1@main/img/bg_cursed_mountain.jpg',
    'bg_falling': 'https://cdn.jsdelivr.net/gh/vinokakak/galgame-part1@main/img/bg_falling.jpg',
    'bg_lunchbox_intact': 'https://cdn.jsdelivr.net/gh/vinokakak/galgame-part1@main/img/bg_lunchbox_intact.jpg',
    'bg_silver_chain': 'https://cdn.jsdelivr.net/gh/vinokakak/galgame-part1@main/img/bg_silver_chain.jpg',
    'bg_title': 'https://cdn.jsdelivr.net/gh/vinokakak/galgame-part1@main/img/title_bg.jpg',
    'bg_cave_dialog': 'https://cdn.jsdelivr.net/gh/vinokakak/galgame-part1@main/img/bg_abyss_approach.jpg',
    'bg_cliff_morning': 'https://cdn.jsdelivr.net/gh/vinokakak/galgame-part1@main/img/bg_cliff_edge.jpg',
    'bg_village_morning': 'https://cdn.jsdelivr.net/gh/vinokakak/galgame-part1@main/img/bg_village_gate.jpg',
    'bg_hillside_sunlight': 'https://cdn.jsdelivr.net/gh/vinokakak/galgame-part1@main/img/bg_cliff_edge.jpg',
    'cg_chain_break': 'https://cdn.jsdelivr.net/gh/vinokakak/galgame-part1@main/img/bg_silver_chain.jpg',
};

        // ==================== 剧本内容 ====================
        const script = [
    // 标题
    { type: 'title_start' },
    
    // 开场独白
    { type: 'prologue' },
    
    // 章节标题
    { type: 'chapter', text: '第一章\n温暖的深渊' },
    
    // ========== 序幕：尤里斯醒来 ==========
    { type: 'bg', image: 'bg_morning_tears' },
    { type: 'narration', text: '尤里斯醒来的时候脸上是湿的。' },
    { type: 'narration', text: '不是哭过。没做什么梦，也没觉得难过。只是每天早上睁开眼，泪水就在那里。' },
    { type: 'narration', text: '他用袖子擦了擦，翻身下了床。' },
    { type: 'narration', text: '不知道为什么。一直都是这样。' },
    
    // ========== 莱恩家的清晨 ==========
    { type: 'bg', image: 'bg_village_morning' },
    { type: 'narration', text: '厨房里飘出面包的香气。戴西娜阿姨正在把刚出炉的黑麦面包从炉子里取出来。' },
    { type: 'text', speaker: '戴西娜阿姨', text: '早安，尤里斯。去叫安娜起床，再去叫佩斯吃早饭。' },
    { type: 'text', speaker: '尤里斯', text: '好。' },
    { type: 'narration', text: '他先去了安娜的房间。小姑娘蜷成一团睡得香甜，被子蹬到了一边。' },
    { type: 'text', speaker: '尤里斯', text: '安娜，该起床了。' },
    { type: 'text', speaker: '安娜', text: '唔……再睡五分钟……' },
    { type: 'text', speaker: '尤里斯', text: '戴西娜阿姨做了面包。还有蜂蜜。' },
    { type: 'text', speaker: '安娜', text: '五分钟！' },
    { type: 'narration', text: '尤里斯摇摇头，转身离开。五分钟后安娜会自己跑下来的。' },
    { type: 'narration', text: '佩斯叔叔在院子里劈柴。' },
    { type: 'text', speaker: '佩斯叔叔', text: '早啊，小子。今天天气不错，去山上捡些柴火回来吧。' },
    { type: 'text', speaker: '尤里斯', text: '好。' },
    { type: 'text', speaker: '佩斯叔叔', text: '别走太远，往西边的路别去。莫斯爷爷说过，那边不太平。' },

    { type: 'text', speaker: '戴西娜阿姨', text: '午饭带着！' },
    { type: 'narration', text: '他折回厨房，接过她递来的饭盒，塞进腰间的绳子里固定好。' },
    
    // ========== 莫斯爷爷 ==========
    { type: 'bg', image: 'bg_village_gate' },
    { type: 'narration', text: '出门的时候路过莫斯爷爷的小木屋。老人正在门口摆弄一个小东西——不是木偶，是些说不上名字的玩意儿。' },
    { type: 'text', speaker: '尤里斯', text: '莫斯爷爷，早安。' },
    { type: 'text', speaker: '莫斯爷爷', text: '哟，小尤里斯。又去砍柴啊？' },
    { type: 'text', speaker: '尤里斯', text: '嗯，佩斯叔叔让去的。' },
    { type: 'narration', text: '他凑过去看老人手上的东西。那是一个像花但花的形状不对的小物件。' },
    { type: 'text', speaker: '尤里斯', text: '这个是什么？' },
    { type: 'text', speaker: '莫斯爷爷', text: '这个啊……很遥远的地方的东西。' },
    { type: 'narration', text: '老人笑眯眯地看着很远的地方，像天上面还有一层天。' },
    { type: 'text', speaker: '莫斯爷爷', text: '别往西边走啊，小子。' },
    { type: 'text', speaker: '尤里斯', text: '我知道，佩斯叔叔也说了。' },
    { type: 'text', speaker: '莫斯爷爷', text: '那就好，那就好。' },
    
    // ========== 雷纳德队长 ==========
    { type: 'narration', text: '村口的布告栏上贴着一张旧告示——关于"奥瑞利安大人消灭堕羽巢穴"的通报。' },
    { type: 'narration', text: '旁边的民兵营地里，一个络腮胡男人坐在木箱上，嗓门很大。' },
    { type: 'text', speaker: '雷纳德队长', text: '我跟你们说，那堕羽啊，最怕的就是圣阳之力！一剑劈下来，黑的变成灰的——' },
    { type: 'text', speaker: '民兵', text: '雷队长，又吹上了！' },
    { type: 'text', speaker: '雷纳德队长', text: '吹什么？我亲眼见过的！' },
    { type: 'narration', text: '他注意到尤里斯，朝他招了招手。' },
    { type: 'text', speaker: '雷纳德队长', text: '小子！过来！砍柴去？' },
    { type: 'text', speaker: '尤里斯', text: '嗯。队长，您年轻时候也打过堕羽吧？' },
    { type: 'narration', text: '雷纳德的脸色微微变了变，又灌了一口酒。' },
    { type: 'text', speaker: '雷纳德队长', text: '打过。三四只还是见过的。' },
    { type: 'text', speaker: '尤里斯', text: '真的？' },
    { type: 'text', speaker: '雷纳德队长', text: '那玩意儿……不是人该看的。不过咱们这儿偏，堕羽不往这边来。你小子运气好，这辈子估计见不着。' },
    { type: 'text', speaker: '尤里斯', text: '那堕羽到底长什么样？' },
    { type: 'narration', text: '雷纳德看了他一眼。' },
    { type: 'text', speaker: '雷纳德队长', text: '黑的。翅膀是黑的，眼睛是黑的，全身上下没一点亮的地方。跟从墨水里捞出来似的。' },
    { type: 'text', speaker: '雷纳德队长', text: '大的有房子那么高，小的也跟牛差不多大。爪子一挠，人就成两截了。' },
    { type: 'text', speaker: '尤里斯', text: '那……有办法打吗？' },
    { type: 'narration', text: '雷纳德沉默了一会儿。' },
    { type: 'text', speaker: '雷纳德队长', text: '坠杀法。用地上的东西把天上的东西弄下来，在地上了结它。但要七个人配合，还得死几个。' },
    { type: 'narration', text: '他看着尤里斯，眼神里有些什么。' },
    { type: 'text', speaker: '雷纳德队长', text: '小子，你记住——堕羽不是人打的。是人拿命换的。' },
    { type: 'text', speaker: '尤里斯', text: '……我记住了。' },
    { type: 'text', speaker: '雷纳德队长', text: '行了，去砍柴吧。天黑前回来。' },
    
    // ========== 东边山林 ==========
    { type: 'bg', image: 'bg_forest_east' },
    { type: 'narration', text: '东边的山路他已经走得很熟了。穿过一片矮树林，绕过一个小池塘，再爬一段坡，就能看到大片的橡木林。' },
    { type: 'narration', text: '斧头砍进树干的声音清脆而规律。太阳爬到头顶，他捆好了柴火，准备下山。' },
    { type: 'narration', text: '他本来应该直接往回走的。' },
    { type: 'narration', text: '但他看见了那道光。' },
    { type: 'narration', text: '紫色的。' },
    { type: 'narration', text: '只是一瞬间的事。那道光从西边的方向射过来，闪了一下就消失了。' },
    { type: 'narration', text: '也许是什么东西反射的阳光吧。他这样告诉自己。然后他往那个方向走了几步。' },
    
    // ========== 悬崖边 ==========
    { type: 'bg', image: 'bg_cliff_edge' },
    { type: 'narration', text: '再走几步就到了悬崖边。山崖陡然下降，形成一道深深的裂谷。' },
    { type: 'narration', text: '那道紫色的光就是从下面射出来的。' },
    { type: 'narration', text: '他探出头往下看。深不见底。风吹上来，带着潮湿阴冷的气息。' },
    { type: 'narration', text: '他盯着下面看了很久。然后他的脚踩在一块松动的岩石上。' },
    { type: 'narration', text: '岩石滚动。世界倾斜。' },
    { type: 'narration', text: '尤里斯伸出手想抓住什么，但什么也没抓到。风声灌进耳朵，眼前的景象飞速上升——' },
    { type: 'narration', text: '饭盒从腰间甩了出去。' },
    { type: 'narration', text: '然后，一切都变慢了。' },
    { type: 'narration', text: '有什么东西从黑暗中托住了他，轻悄悄的，像一只看不见的手。坠落变成飘落——他的脚踩到了地面。' },
    { type: 'narration', text: '膝盖一软，他跪了下去。' },
    
    // ========== 深渊底部 ==========
    { type: 'bg', image: 'bg_abyss_approach' },
    { type: 'narration', text: '安静了很久。他慢慢摸了摸自己的身体——手臂能动，腿也没断，什么伤都没有。' },
    { type: 'narration', text: '不可能的。那个高度，他应该……' },
    { type: 'narration', text: '四周很暗。但岩壁上嵌着一些东西，发出幽暗的紫色微光。那道紫光，就是他坠崖之前看到的那道。' },
    { type: 'narration', text: '他站起来，环顾四周。空气又冷又潮，带着一股陈旧的味道。' },
    { type: 'narration', text: '饭盒躺在几步之外，盖子摔开了，面包滚出来——但饭盒没有变形。从那么高掉下来，居然连一个坑都没有。' },
    { type: 'narration', text: '他把面包塞回去，继续往前走。' },
    
    // ========== 进入石室 ==========
    { type: 'bg', image: 'bg_alice_chained' },
    { type: 'narration', text: '越走越深。紫色微光越来越亮。他拐过一个弯，前面突然开阔了。' },
    { type: 'narration', text: '石室。圆形的，穹顶很高，紫色的光从四面八方渗出来。像水底。像很久没人去过的洞穴。' },
    { type: 'narration', text: '他的呼吸停了一拍。' },
    { type: 'narration', text: '石室中央有一把石椅。石椅上坐着一个人。' },
    { type: 'narration', text: '一个女孩。' },
    { type: 'narration', text: '很瘦，黑发垂到石椅脚边。穿着一件黑色的裙子，在紫色光芒下泛着冷冷的光泽。' },
    { type: 'narration', text: '她的双手被铁链锁着。银灰色的链条从手腕延伸出来，绕过石椅的扶手，沉入黑暗。' },
    { type: 'narration', text: '她一动不动。像一尊被遗忘的雕像。' },
    { type: 'narration', text: '尤里斯的腿在抖。不是因为她可怕——是因为她太安静了。一个活人不应该这么安静。' },
    
    // ========== 靠近 ==========
    { type: 'narration', text: '但就在这时——他的胸口突然紧了一下。' },
    { type: 'narration', text: '不是疼。不是难受。是某种说不清的、突如其来的……紧。像是有什么东西在胸腔里动了一下。' },
    { type: 'narration', text: '他低头看了看自己的手。没有抖了。奇怪。' },
    { type: 'narration', text: '他继续往前走了。一步。又一步。' },
    { type: 'narration', text: '石椅就在面前了。他蹲下来——她的脸完全露了出来。眼睛闭着，睫毛很长。嘴唇干裂，微微张开，像是在呼吸。' },
    { type: 'narration', text: '在呼吸。还活着。' },
    { type: 'narration', text: '他犹豫了一下，伸出手在她面前晃了晃。没有反应。又晃了晃。还是没反应。' },
    { type: 'text', speaker: '尤里斯', text: '喂？' },
    { type: 'narration', text: '声音在石室里回荡，显得很小。她没有醒。' },
    { type: 'narration', text: '他不知道该怎么办。他可以就这样走掉，但——她看起来很饿。不知道为什么他有这个感觉。' },
    { type: 'narration', text: '他低头看了看自己怀里的饭盒。' },
    
    // ========== 黑猫艾米 ==========
    { type: 'bg', image: 'bg_black_cat' },
    { type: 'narration', text: '就在他犹豫的时候——' },
    { type: 'narration', text: '喵。' },
    { type: 'narration', text: '尤里斯的心脏猛地一缩。他本能地往后退，整个人摔了个四脚朝天。饭盒飞出去，哐当撞在石壁上。' },
    { type: 'narration', text: '石椅的阴影里蹲着一团黑乎乎的东西。一只猫。黑色的猫，在紫色光芒下泛着幽幽的光。' },
    { type: 'text', speaker: '尤里斯', text: '你……你从哪冒出来的？' },
    { type: 'narration', text: '猫没理他。它从阴影里跳出来，围着他转了一圈。然后它抬起头——那双眼睛是紫色的。和石壁上晶体一样的颜色。' },
    { type: 'text', speaker: '尤里斯', text: '……吓死我了。' },
    { type: 'narration', text: '他站起来，拍了拍灰，又把饭盒捡起来。' },
    
    // ========== 艾丽斯睁眼 ==========
    { type: 'bg', image: 'bg_alice_eyes' },
    { type: 'narration', text: '黑猫跳回去了，蹲在女孩膝盖旁边，用脑袋蹭了蹭垂下来的手指。' },
    { type: 'narration', text: '就在这时——女孩睁开了眼睛。' },
    { type: 'narration', text: '紫色的眼睛。不是猫眼睛那种透亮的紫，是更深更暗的紫。像是凝固的宝石。' },
    { type: 'narration', text: '那双眼睛看向他。没有惊讶，没有害怕，没有好奇。什么都没有。' },
    { type: 'narration', text: '他看着那双眼睛。胸口那个地方又动了。不是害怕——他已经把害怕忘了。他只是……看着她。不想走。' },
    
    // ========== 初次对话 ==========
    { type: 'text', speaker: '尤里斯', text: '呃……你好？' },
    { type: 'narration', text: '这句话蠢得要命。女孩没有回答，只是看着他。' },
    { type: 'text', speaker: '尤里斯', text: '我……我叫尤里斯。我不是故意闯进来的。我是从上面摔下来的。' },
    { type: 'narration', text: '他指了指头顶。那里什么也看不到，只有石壁和黑暗。' },
    { type: 'text', speaker: '尤里斯', text: '然后我就到这里了。' },
    { type: 'narration', text: '女孩还是没有说话。沉默。漫长的沉默。黑猫在她膝盖上蜷成一团，打起了呼噜。' },
    { type: 'narration', text: '尤里斯开始觉得不自在了。他干脆把饭盒放在地上，打开盖子。' },
    { type: 'text', speaker: '尤里斯', text: '你……饿吗？' },
    { type: 'narration', text: '他把饭盒推到她面前。黑麦面包，一小块奶酪，几片腌菜。' },
    { type: 'narration', text: '女孩低头看着饭盒。看了很久。然后她伸出手——动作很慢，像是不知道怎么做——拿起面包。' },
    { type: 'narration', text: '铁链哗啦响了一声。' },
    
    // ========== 关于食物 ==========
    { type: 'text', speaker: '尤里斯', text: '好吃吗？' },
    { type: 'narration', text: '她抬起头看了他一眼。' },
    { type: 'text', speaker: '艾丽斯', text: '不知道。' },
    { type: 'text', speaker: '尤里斯', text: '不知道？' },
    { type: 'text', speaker: '艾丽斯', text: '不知道什么是好吃。' },
    { type: 'narration', text: '她又低下头，继续吃。每一口都嚼很久。面包，奶酪，腌菜，她都吃了，但没有任何评价。' },
    { type: 'narration', text: '她吃完了最后一口。然后她把手里那块剩下的面包皮——递向他。' },
    { type: 'text', speaker: '艾丽斯', text: '……给你。' },
    { type: 'text', speaker: '尤里斯', text: '我不饿。你吃吧。' },
    { type: 'narration', text: '她看了他两秒，把面包皮收回去，塞进嘴里，嚼完了。' },
    
    // ========== 连串追问 ==========
    { type: 'text', speaker: '尤里斯', text: '那些铁链……是怎么锁上去的？' },
    { type: 'text', speaker: '艾丽斯', text: '不知道。醒来的时候就在这里了。' },
    { type: 'text', speaker: '尤里斯', text: '醒来？你一直在这里？' },
    { type: 'text', speaker: '艾丽斯', text: '不知道。' },
    { type: 'text', speaker: '尤里斯', text: '你有名字吗？' },
    { type: 'text', speaker: '艾丽斯', text: '不知道。' },
    { type: 'text', speaker: '尤里斯', text: '有人来看过你吗？' },
    { type: 'text', speaker: '艾丽斯', text: '不知道。' },
    { type: 'text', speaker: '尤里斯', text: '你是怎么来到这里的？' },
    { type: 'text', speaker: '艾丽斯', text: '不知道。' },
    { type: 'narration', text: '她说的每一句话都很短，很淡。没有起伏，没有情绪。只是空。' },
    { type: 'text', speaker: '尤里斯', text: '你……你是人类吗？' },
    { type: 'narration', text: '那双紫色的眼睛里终于有了一丝波动。' },
    { type: 'text', speaker: '艾丽斯', text: '不知道。' },
    { type: 'narration', text: '又是这三个字。尤里斯叹了口气，干脆坐下来，背靠着石椅腿。' },
    
    // ========== 艾米 ==========
    { type: 'text', speaker: '尤里斯', text: '那你有朋友吗？' },
    { type: 'narration', text: '女孩没有立刻回答。她低着头，手指轻轻抚摸着膝盖上的黑猫。' },
    { type: 'text', speaker: '艾丽斯', text: '有。' },
    { type: 'narration', text: '她说着，目光落在猫身上。' },
    { type: 'text', speaker: '尤里斯', text: '它叫什么？' },
    { type: 'text', speaker: '艾丽斯', text: '……艾米。' },
    { type: 'text', speaker: '尤里斯', text: '艾米。你可以听懂它说话？' },
    { type: 'text', speaker: '艾丽斯', text: '……不知道。它说什么，我能懂。' },
    { type: 'narration', text: '黑猫甩了甩尾巴，又喵了一声。' },
    { type: 'text', speaker: '尤里斯', text: '它说什么了？' },
    { type: 'narration', text: '女孩沉默了一会儿。' },
    { type: 'text', speaker: '艾丽斯', text: '它说你很吵。' },
    { type: 'narration', text: '尤里斯愣了一下，然后忍不住笑了。' },
    { type: 'text', speaker: '尤里斯', text: '抱歉，我话太多了。' },
    { type: 'narration', text: '黑猫又喵了一声。' },
    { type: 'text', speaker: '尤里斯', text: '它说什么？' },
    { type: 'text', speaker: '艾丽斯', text: '说没关系。' },
    { type: 'text', speaker: '尤里斯', text: '它经常这么说吗？' },
    { type: 'text', speaker: '艾丽斯', text: '……不知道。' },
    { type: 'narration', text: '她摸了摸艾米的脑袋，动作很轻。' },
    
    // ========== 砸铁链 ==========
    { type: 'narration', text: '他站起来，绕到石椅侧面，想看看铁链是怎么固定的。他试着拽了拽，纹丝不动。' },
    { type: 'text', speaker: '尤里斯', text: '我试试能不能把链条弄开。' },
    { type: 'narration', text: '他从地上捡起一块石头，砸链条和椅子的连接处。' },
    { type: 'narration', text: '当。当。当。' },
    { type: 'narration', text: '链条没动。每一下都会出现白印——然后消失。' },
    { type: 'text', speaker: '尤里斯', text: '这东西……不是铁。' },
    { type: 'text', speaker: '尤里斯', text: '你在这里多久了？' },
    { type: 'text', speaker: '艾丽斯', text: '不知道。' },
    { type: 'text', speaker: '尤里斯', text: '从来没有试着解开吗？' },
    { type: 'text', speaker: '艾丽斯', text: '试过。' },
    { type: 'text', speaker: '尤里斯', text: '结果呢？' },
    { type: 'text', speaker: '艾丽斯', text: '解不开。' },
    { type: 'narration', text: '她的声音很平静，没有沮丧，没有愤怒。' },
    { type: 'text', speaker: '尤里斯', text: '你……不会饿？不会渴？' },
    { type: 'text', speaker: '艾丽斯', text: '不知道饿。不知道渴。不知道冷。不知道疼。' },
    { type: 'narration', text: '她说一句，尤里斯的心就紧一分。' },
    { type: 'text', speaker: '尤里斯', text: '那你为什么要吃东西？' },
    { type: 'text', speaker: '艾丽斯', text: '不知道。' },
    
    // ========== 决定离开 ==========
    { type: 'narration', text: '他猛地站起来。' },
    { type: 'text', speaker: '尤里斯', text: '糟了。我得回去了。' },
    { type: 'narration', text: '他开始往通道口的方向走。但走了几步又停下来，回头看着她。' },
    { type: 'text', speaker: '尤里斯', text: '你……你叫什么名字？' },
    { type: 'narration', text: '女孩看着他。紫色的眼睛在暗处发着微光。' },
    { type: 'text', speaker: '艾丽斯', text: '……艾丽斯。' },
    { type: 'narration', text: '她停了停，像是在试着念出一个很久没说过的词。' },
    { type: 'text', speaker: '艾丽斯', text: '艾丽斯。' },
    { type: 'text', speaker: '艾丽斯', text: '你会再来的吗？' },
    { type: 'narration', text: '不是请求，不是期待，只是……问。' },
    { type: 'text', speaker: '尤里斯', text: '会。我会再来的。' },
    { type: 'narration', text: '他走过去，在她面前蹲下来。' },
    { type: 'text', speaker: '尤里斯', text: '你一个人不会害怕吗？' },
    { type: 'text', speaker: '艾丽斯', text: '不知道什么是害怕。' },
    { type: 'text', speaker: '尤里斯', text: '我会想办法把你救出去。' },
    { type: 'text', speaker: '艾丽斯', text: '不用。' },
    { type: 'text', speaker: '尤里斯', text: '为什么？' },
    { type: 'text', speaker: '艾丽斯', text: '解不开的。' },
    { type: 'text', speaker: '尤里斯', text: '我会想办法。' },
    { type: 'text', speaker: '艾丽斯', text: '解不开的。' },
    { type: 'text', speaker: '尤里斯', text: '我说了我会想办法！' },
    { type: 'narration', text: '他的声音有点大。回声在石室里响了一圈，然后消失了。' },
    { type: 'text', speaker: '艾丽斯', text: '你想回去？' },
    { type: 'text', speaker: '尤里斯', text: '嗯。' },
    { type: 'text', speaker: '艾丽斯', text: '我可以送你上去。' },
    
    // ========== 浮空 ==========
    { type: 'narration', text: '尤里斯愣住了。' },
    { type: 'text', speaker: '尤里斯', text: '什么？' },
    { type: 'text', speaker: '艾丽斯', text: '送你上去。回到悬崖上面。' },
    { type: 'narration', text: '她抬起一只手，铁链哗啦响了一声。然后——他感觉到脚底有什么东西在托他。' },
    { type: 'narration', text: '轻轻的，柔柔的，像被一层看不见的水托起来。和坠崖时一模一样的感觉。' },
    { type: 'narration', text: '他飘了起来。慢慢地，稳稳地。石室在脚下远去，紫光在身边流过。' },
    { type: 'narration', text: '越来越亮。越来越暖。' },
    { type: 'narration', text: '然后他的脚落在了草地上。阳光照在脸上。' },
    { type: 'narration', text: '他转过头，探出悬崖往下看。深不见底。' },
    { type: 'text', speaker: '尤里斯', text: '……谢谢。' },
    
    // ========== 晚饭 ==========
    { type: 'bg', image: 'bg_village_morning' },
    { type: 'narration', text: '晚饭的时候，尤里斯几乎没怎么说话。' },
    { type: 'text', speaker: '安娜', text: '今天隔壁婶婶说东边的树林里出现了奇怪的脚印！可能是野兽！' },
    { type: 'text', speaker: '安娜', text: '还有莫斯爷爷的木偶戏团又排了新故事，这次是王子打败恶龙拯救公主！' },
    { type: 'narration', text: '尤里斯听着，偶尔点点头。他的心思完全不在这里。' },
    { type: 'text', speaker: '戴西娜阿姨', text: '尤里斯？你在想什么？这么入神。' },
    { type: 'text', speaker: '尤里斯', text: '没什么……在想明天去砍柴的事。' },
    { type: 'text', speaker: '佩斯叔叔', text: '别太累了，慢慢来。' },
    { type: 'narration', text: '他躺在床上，盯着天花板。他不知道该怎么处理这件事。但他知道——明天，他会再去的。' },
    
    // ========== 第二次去深渊 ==========
    { type: 'bg', image: 'bg_cliff_edge' },
    { type: 'narration', text: '第二次去那个石室，尤里斯带了一个饭盒。他站在崖边往下看。' },
    { type: 'text', speaker: '尤里斯', text: '……艾丽斯？' },
    { type: 'narration', text: '没有回音。' },
    { type: 'text', speaker: '尤里斯', text: '艾丽斯！' },
    { type: 'narration', text: '安静。风声。什么都没有。他咬了咬牙——往下跳了。' },
    { type: 'narration', text: '风声灌进耳朵的那一瞬间他差点后悔。但下一秒，那种熟悉的感觉就来了——身体变轻，被一只看不见的手接住，轻悄悄地放到地上。' },
    
    // ========== 重逢 ==========

    { type: 'text', speaker: '艾丽斯', text: '你掉下来的时候，很吵。' },
    { type: 'narration', text: '尤里斯愣了一下，然后忍不住笑了。他从怀里掏出饭盒，走过去蹲下来。' },

    { type: 'text', speaker: '艾丽斯', text: '不知道。' },

    { type: 'bg', image: 'bg_morning_tears' },

    // ========== 家是什么 ==========

    { type: 'text', speaker: '尤里斯', text: '家就是……有人在的地方。有家人在的地方。' },

    { type: 'narration', text: '艾丽斯看着他，沉默了很久。紫色的眼睛里有什么东西在动。很轻，很淡，像是水面上的涟漪。' },
    
    // ========== 破链 ==========
    { type: 'cg', image: 'cg_chain_break' },
    { type: 'narration', text: '然后她做了一件从未做过的事。' },

    { type: 'narration', text: '她的手指碰到他的手背。不是轻轻的触碰——那是抓。像溺水的人抓住最后一根浮木。' },
    { type: 'narration', text: '然后铁链猛地绷紧了。勒得更深，嵌进她手腕的皮肉里。有什么液体从缝隙里渗出来——是血。' },

    { type: 'narration', text: '咔嚓。链条碎了。所有的链条。银灰色的碎片飞散开来，像萤火虫一样飘荡在空气里。' },
    { type: 'narration', text: '她低着头，看着自己空荡荡的手腕。暗红色的勒痕，和从旧伤里渗出来的新血。' },
    { type: 'narration', text: '然后她抬起头，看着尤里斯。' },

    { type: 'narration', text: '只有一个字。那是她人生中第一次说出的、关于感受的词。' },
    { type: 'text', speaker: '尤里斯', text: '……艾丽斯。' },

    { type: 'text', speaker: '艾丽斯', text: '给你看。' },
    { type: 'narration', text: '语气和平时一样，淡淡的。但那是她第一次主动向他展示什么。' },
    
    // ========== 站起来 ==========
    { type: 'bg', image: 'bg_alice_eyes' },
    { type: 'narration', text: '锁链碎掉以后，艾丽斯第一次从石椅上站了起来。站得很不稳，像一只很久没有走过路的雏鸟。' },
    { type: 'text', speaker: '尤里斯', text: '慢慢来。' },
    { type: 'narration', text: '他伸手扶住她。她迈出了第一步。' },
    { type: 'text', speaker: '尤里斯', text: '能走吗？' },
    { type: 'text', speaker: '艾丽斯', text: '……能。' },
    { type: 'text', speaker: '艾丽斯', text: '我送你上去。然后……我也上去。' },
    { type: 'text', speaker: '尤里斯', text: '你能上去？' },
    { type: 'text', speaker: '艾丽斯', text: '能。' },
    
    // ========== 翅膀 ==========

    { type: 'narration', text: '他应该跑。但浮空的力量还托着他。轻柔的，稳稳的。她一直在用这股力量送他上去。每一天。每一次。' },

    { type: 'label', name: 'after_choice2' },

    { type: 'narration', text: '她站在阳光里，举手指挡住那道光。只是一个苍白的、瘦弱的女孩。' },

        // ==================== 游戏引擎 ====================
        
        // DOM元素
        const bgEl = document.getElementById('background');
        const dialogBox = document.getElementById('dialog-box');
        const speakerEl = document.getElementById('speaker-name');
        const textEl = document.getElementById('dialog-text');
        const narrationEl = document.getElementById('narration');
        let currentMode = ''; // 'dialog' or 'narration'
        const choiceContainer = document.getElementById('choice-container');
        const continueHint = document.getElementById('continue-hint');
        const titleScreen = document.getElementById('title-screen');
        const chapterTitle = document.getElementById('chapter-title');
        const endScreen = document.getElementById('end-screen');
        const cgLayer = document.getElementById('cg-layer');
        const cgImage = document.getElementById('cg-image');
        
        // 游戏状态
        let scriptIndex = 0;
        let isTyping = false;
        let typingTimer = null;
        let currentText = '';
        let currentCharIndex = 0;
        let waitingForChoice = false;
        let showingCG = false;
        let gameStarted = false;
        let gameEnded = false;
        
        // DOM元素
        const titleBgEl = document.getElementById('title-screen-bg');
        
        // 初始化
        function init() {
            // 设置标题画面背景
            titleBgEl.src = IMAGES['bg_title'] || '';
            
            // 标题菜单按钮
            document.getElementById('btn-new-game').addEventListener('click', function(e) {
                e.stopPropagation();
                startGame();
            });
            document.getElementById('btn-load').addEventListener('click', function(e) {
                e.stopPropagation();
                showLoadScreen();
            });
            document.getElementById('btn-cg').addEventListener('click', function(e) {
                e.stopPropagation();
                showCGGallery();
            });
            document.getElementById('btn-fullscreen').addEventListener('click', function(e) {
                e.stopPropagation();
                toggleFullscreen();
            });
            
            // CG画廊关闭
            document.getElementById('cg-gallery-close').addEventListener('click', function() {
                document.getElementById('cg-gallery').style.display = 'none';
            });
            
            // 存档界面关闭
            document.getElementById('save-load-close').addEventListener('click', function() {
                document.getElementById('save-load-screen').style.display = 'none';
            });
            
            // CG大图预览关闭
            document.getElementById('cg-viewer').addEventListener('click', function() {
                this.style.display = 'none';
            });
            
            // 游戏区域点击
            document.getElementById('game-container').addEventListener('click', handleClick);
            
            // 键盘事件
            document.addEventListener('keydown', handleKeydown);
        }
        
        // 开始游戏
        function startGame() {
            if (gameStarted) return;
            gameStarted = true;
            titleScreen.style.display = 'none';
            scriptIndex = 0;
            executeScript();
        }
        
        // 处理点击
        function handleClick(e) {
            // 忽略标题画面
            if (!gameStarted || gameEnded) return;
            
            // CG显示时点击关闭
            if (showingCG) {
                closeCG();
                return;
            }
            
            // 选择支时不能点击推进
            if (waitingForChoice) return;
            
            // 文字动画时点击立即显示完整
            if (isTyping) {
                showFullText();
                return;
            }
            
            // 推进下一条脚本
            nextScript();
        }
        
        // 处理键盘
        function handleKeydown(e) {
            if (!gameStarted || gameEnded) return;
            if (e.code === 'Space' || e.code === 'Enter') {
                handleClick();
            }
        }
        
        // 执行当前脚本
        function executeScript() {
            if (scriptIndex >= script.length) {
                endGame();
                return;
            }
            
            const cmd = script[scriptIndex];
            
            switch (cmd.type) {
                case 'title_start':
                    // 标题画面由HTML显示，直接推进
                    nextScript();
                    break;
                    
                case 'prologue':
                    showPrologue();
                    break;
                    
                case 'chapter':
                    showChapter(cmd.text);
                    break;
                    
                case 'bg':
                    showBackground(cmd.image);
                    nextScript();
                    break;
                    
                case 'text':
                    showDialog(cmd.speaker, cmd.text);
                    break;
                    
                case 'narration':
                    showNarration(cmd.text);
                    break;
                    
                case 'choice':
                    showChoice(cmd.options);
                    break;
                    
                case 'label':
                    // 标签不显示内容，直接推进
                    nextScript();
                    break;
                    
                case 'goto':
                    jumpToLabel(cmd.target);
                    break;
                    
                case 'cg':
                    showCG(cmd.image);
                    break;
                    
                case 'end':
                    endGame();
                    break;
            }
        }
        
        // 推进到下一条脚本
        function nextScript() {
            scriptIndex++;
            executeScript();
        }
        
        // 跳转到标签
        function jumpToLabel(labelName) {
            const idx = script.findIndex(cmd => cmd.type === 'label' && cmd.name === labelName);
            if (idx !== -1) {
                scriptIndex = idx + 1;
            } else {
                scriptIndex++;
            }
            executeScript();
        }
        
        // 显示背景 - 完整场景图
        function showBackground(imageName) {
            bgEl.src = IMAGES[imageName] || '';
            // 自动解锁CG
            unlockCG(imageName);
        }
        
        // 显示对话框
        function showDialog(speaker, text) {
            hideAll();
            currentMode = 'dialog';
            dialogBox.style.display = 'block';
            speakerEl.textContent = speaker;
            currentText = text;
            currentCharIndex = 0;
            textEl.textContent = '';
            isTyping = true;
            continueHint.style.display = 'none';
            typeText();
        }
        
        // 显示叙述
        function showNarration(text) {
            hideAll();
            currentMode = 'narration';
            narrationEl.style.display = 'block';
            currentText = text;
            currentCharIndex = 0;
            narrationEl.textContent = '';
            isTyping = true;
            continueHint.style.display = 'none';
            typeText();
        }
        
        // 打字效果
        function typeText() {
            if (currentCharIndex < currentText.length) {
                const displayText = currentText.substring(0, currentCharIndex + 1);
                if (currentMode === 'dialog') {
                    textEl.textContent = displayText;
                } else {
                    narrationEl.textContent = displayText;
                }
                currentCharIndex++;
                typingTimer = setTimeout(typeText, 50);
            } else {
                finishTyping();
            }
        }
        
        // 立即显示完整文字
        function showFullText() {
            if (typingTimer) {
                clearTimeout(typingTimer);
            }
            if (currentMode === 'dialog') {
                textEl.textContent = currentText;
            } else {
                narrationEl.textContent = currentText;
            }
            finishTyping();
        }
        
        // 完成打字
        function finishTyping() {
            isTyping = false;
            if (typingTimer) {
                clearTimeout(typingTimer);
                typingTimer = null;
            }
            continueHint.style.display = 'block';
        }
        
        // 开场独白
        const prologueLines = [
            '死亡不可怕。',
            '可怕的是它有刻度。',
            '每一遍都不一样，每一遍都是同一个结局。',
            '路走了一千条，尽头总是同样的风。',
            '风里什么都没有。',
            '有些东西会干。河会干。泪会干。',
            '有些东西不会。它退了又来，每一次都以为是新的浪。',
            '我不数了。',
            '我只记住一件事——',
            '余温不在掌心。在指缝。'
        ];
        
        let prologueActive = false;
        let prologueTimers = [];
        let prologueLineIndex = 0;
        let prologueCurrentEl = null;
        let prologueLineReady = false;
        
        function showPrologue() {
            const prologueEl = document.getElementById('prologue');
            const prologueText = document.getElementById('prologue-text');
            const prologueBgm = document.getElementById('prologue-bgm');
            
            prologueActive = true;
            prologueLineIndex = 0;
            prologueLineReady = false; // 当前行的淡入动画是否完成
            
            prologueText.innerHTML = '';
            prologueEl.style.display = 'flex';
            
            // 播放BGM
            prologueBgm.volume = 0.6;
            prologueBgm.play().catch(() => {});
            
            // 点击：淡入完成前=跳过整段独白，淡入完成后=推进到下一行
            const clickHandler = () => {
                if (!prologueActive) return;
                if (!prologueLineReady) {
                    // 正在淡入，跳过整段独白
                    finishPrologue();
                } else {
                    // 推进到下一行
                    advancePrologue();
                }
            };
            prologueEl.addEventListener('click', clickHandler);
            prologueEl._clickHandler = clickHandler;
            
            // 开始第一行
            showPrologueLine(0);
        }
        
        function advancePrologue() {
            if (!prologueActive || !prologueCurrentEl) return;
            
            // 当前行淡出
            prologueCurrentEl.classList.remove('active');
            prologueCurrentEl.classList.add('fade-out');
            prologueLineReady = false;
            
            // 1s淡出后显示下一行
            const t = setTimeout(() => {
                showPrologueLine(prologueLineIndex + 1);
            }, 1000);
            prologueTimers.push(t);
        }
        
        function showPrologueLine(index) {
            if (!prologueActive) return;
            
            const prologueText = document.getElementById('prologue-text');
            
            // 清除上一行
            if (prologueCurrentEl) {
                prologueText.removeChild(prologueCurrentEl);
            }
            
            // 全部行显示完毕
            if (index >= prologueLines.length) {
                finishPrologue();
                return;
            }
            
            // 创建当前行
            const line = document.createElement('div');
            line.className = 'line';
            line.textContent = prologueLines[index];
            prologueText.appendChild(line);
            prologueCurrentEl = line;
            prologueLineIndex = index;
            
            // 触发淡入
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    line.classList.add('active');
                });
            });
            
            // 淡入完成后标记为可点击推进
            const fadeTimer = setTimeout(() => {
                prologueLineReady = true;
            }, 1200);
            prologueTimers.push(fadeTimer);
        }
        
        function finishPrologue() {
            if (!prologueActive) return;
            prologueActive = false;
            
            prologueTimers.forEach(t => clearTimeout(t));
            prologueTimers = [];
            
            const prologueEl = document.getElementById('prologue');
            const prologueText = document.getElementById('prologue-text');
            const prologueBgm = document.getElementById('prologue-bgm');
            
            if (prologueEl._clickHandler) {
                prologueEl.removeEventListener('click', prologueEl._clickHandler);
                prologueEl._clickHandler = null;
            }
            
            // 当前行淡出
            if (prologueCurrentEl) {
                prologueCurrentEl.classList.remove('active');
                prologueCurrentEl.classList.add('fade-out');
            }
            
            // BGM淡出
            fadeAudio(prologueBgm, 2000, 0.6);
            
            // 1.5s后隐藏prologue，进入下一脚本
            setTimeout(() => {
                prologueEl.style.display = 'none';
                prologueText.innerHTML = '';
                prologueCurrentEl = null;
                prologueBgm.pause();
                prologueBgm.currentTime = 0;
                nextScript();
            }, 1500);
        }
        
        function fadeAudio(audio, duration, startVol) {
            const steps = 20;
            const stepTime = duration / steps;
            const volStep = startVol / steps;
            let current = startVol;
            const interval = setInterval(() => {
                current -= volStep;
                if (current <= 0) {
                    audio.volume = 0;
                    clearInterval(interval);
                } else {
                    audio.volume = current;
                }
            }, stepTime);
        }
        
        // 显示章节标题
        function showChapter(text) {
            hideAll();
            chapterTitle.style.display = 'flex';
            chapterTitle.querySelector('h1').textContent = text.replace(/\\n/g, '\n');
            
            // 3.5秒后自动消失
            setTimeout(() => {
                chapterTitle.style.display = 'none';
                nextScript();
            }, 3500);
        }
        
        // 显示选择支
        function showChoice(options) {
            hideAll();
            waitingForChoice = true;
            choiceContainer.style.display = 'flex';
            choiceContainer.innerHTML = '';
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = opt.text;
                btn.addEventListener('click', () => {
                    selectChoice(opt.jump);
                });
                choiceContainer.appendChild(btn);
            });
        }
        
        // 选择
        function selectChoice(jumpTarget) {
            waitingForChoice = false;
            choiceContainer.style.display = 'none';
            jumpToLabel(jumpTarget);
        }
        
        // 显示CG - 完整CG插画
        function showCG(imageName) {
            showingCG = true;
            cgImage.src = IMAGES[imageName] || '';
            cgLayer.style.display = 'flex';
            // 自动解锁CG
            unlockCG(imageName);
        }
        
        // 关闭CG
        function closeCG() {
            showingCG = false;
            cgLayer.style.display = 'none';
            nextScript();
        }
        
        // 隐藏所有UI
        function hideAll() {
            dialogBox.style.display = 'none';
            narrationEl.style.display = 'none';
            continueHint.style.display = 'none';
            choiceContainer.style.display = 'none';
        }
        
        // ===== 存档系统 =====
        const SAVE_KEY = 'galgame_saves';
        const MAX_SAVES = 8;
        
        function getSaves() {
            try {
                return JSON.parse(localStorage.getItem(SAVE_KEY)) || {};
            } catch { return {}; }
        }
        
        function saveGame(slotIndex) {
            const saves = getSaves();
            saves[slotIndex] = {
                scriptIndex: scriptIndex,
                timestamp: Date.now(),
                currentBg: document.getElementById('background').src
            };
            localStorage.setItem(SAVE_KEY, JSON.stringify(saves));
        }
        
        function loadGame(slotIndex) {
            const saves = getSaves();
            const data = saves[slotIndex];
            if (!data) return false;
            
            gameStarted = true;
            titleScreen.style.display = 'none';
            document.getElementById('save-load-screen').style.display = 'none';
            scriptIndex = data.scriptIndex;
            executeScript();
            return true;
        }
        
        function showLoadScreen() {
            const saves = getSaves();
            const container = document.getElementById('save-slots');
            container.innerHTML = '';
            
            for (let i = 0; i < MAX_SAVES; i++) {
                const slot = document.createElement('div');
                slot.className = 'save-slot';
                const data = saves[i];
                
                if (data) {
                    const date = new Date(data.timestamp);
                    const dateStr = date.toLocaleString('zh-CN');
                    slot.innerHTML = `<div class="slot-info"><div class="slot-label">存档 ${i + 1}</div><div class="slot-detail">${dateStr} · 脚本位置 ${data.scriptIndex}</div></div>`;
                    slot.addEventListener('click', function() {
                        loadGame(i);
                    });
                } else {
                    slot.innerHTML = `<div class="slot-empty">存档 ${i + 1} — 空</div>`;
                }
                container.appendChild(slot);
            }
            
            document.getElementById('save-load-screen').style.display = 'flex';
        }
        
        // ===== CG画廊 =====
        const CG_LIST = [
            { key: 'bg_morning_tears', name: '晨泪' },
            { key: 'bg_lean_morning', name: '清晨' },
            { key: 'bg_village_gate', name: '村口' },
            { key: 'bg_forest_east', name: '东之森' },
            { key: 'bg_cliff_edge', name: '悬崖' },
            { key: 'bg_abyss_approach', name: '深渊入口' },
            { key: 'bg_alice_chained', name: '被锁链束缚的艾丽斯' },
            { key: 'bg_alice_eyes', name: '艾丽斯的眼眸' },
            { key: 'bg_alice_bread', name: '面包' },
            { key: 'cg_pace_woodcut', name: '木刻步伐' },
            { key: 'cg_anna_sleeping', name: '安睡' },
            { key: 'bg_black_cat', name: '黑猫' },
            { key: 'bg_mos_puppet', name: '莫斯的人偶' },
            { key: 'bg_strange_puppet', name: '奇异人偶' },
            { key: 'bg_cursed_mountain', name: '诅咒之山' },
            { key: 'bg_falling', name: '坠落' },
            { key: 'bg_lunchbox_intact', name: '便当' },
            { key: 'bg_silver_chain', name: '银色锁链' },
            { key: 'bg_title', name: '标题' }
        ];
        
        const UNLOCK_KEY = 'galgame_cg_unlocked';
        
        function getUnlockedCGs() {
            try {
                return JSON.parse(localStorage.getItem(UNLOCK_KEY)) || [];
            } catch { return []; }
        }
        
        function unlockCG(key) {
            const unlocked = getUnlockedCGs();
            if (!unlocked.includes(key)) {
                unlocked.push(key);
                localStorage.setItem(UNLOCK_KEY, JSON.stringify(unlocked));
            }
        }
        
        function showCGGallery() {
            const unlocked = getUnlockedCGs();
            const grid = document.getElementById('cg-gallery-grid');
            grid.innerHTML = '';
            
            CG_LIST.forEach(function(item) {
                const thumb = document.createElement('div');
                const isUnlocked = unlocked.includes(item.key);
                thumb.className = 'cg-thumb' + (isUnlocked ? '' : ' locked');
                
                if (IMAGES[item.key]) {
                    const img = document.createElement('img');
                    img.src = IMAGES[item.key];
                    thumb.appendChild(img);
                }
                
                if (isUnlocked) {
                    thumb.addEventListener('click', function() {
                        const viewer = document.getElementById('cg-viewer');
                        document.getElementById('cg-viewer-img').src = IMAGES[item.key] || '';
                        viewer.style.display = 'flex';
                    });
                }
                
                grid.appendChild(thumb);
            });
            
            document.getElementById('cg-gallery').style.display = 'flex';
        }
        
        // ===== 全屏 =====
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(function() {});
            } else {
                document.exitFullscreen().catch(function() {});
            }
        }
        
        // 结束游戏
        function endGame() {
            gameEnded = true;
            hideAll();
            endScreen.style.display = 'flex';
        }
        
        // 启动游戏
        init();
    </script>
</body>
</html>
